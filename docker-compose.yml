services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env                       # ANTHROPIC_API_KEY / ANTHROPIC_MODEL (gitignored)
    environment:
      SQLITE_PATH: /data/db.sqlite3 # state on a named volume → survives restart
      DJANGO_DEBUG: "0"
    volumes:
      - sqlite-data:/data

volumes:
  sqlite-data:
